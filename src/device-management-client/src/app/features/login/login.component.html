<div class="min-h-screen bg-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">
      Device<span class="text-blue-500">Log</span>
    </h1>
    <h2 class="text-sm font-medium text-slate-400 uppercase tracking-widest">
      Enterprise Asset Management
    </h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-2xl rounded-2xl sm:px-10 border border-slate-200">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700">Email Address</label>
          <div class="mt-1">
            <input formControlName="email" type="email" 
                   class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                   placeholder="name@company.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
          <div class="mt-1">
            <input formControlName="password" type="password" 
                   class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                   placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded">
            <label class="ml-2 block text-sm text-slate-600">Remember me</label>
          </div>
          <div class="text-sm">
            <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Forgot password?</a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid"
                  class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition disabled:opacity-50 disabled:cursor-not-allowed">
            Sign In
          </button>
        </div>
      </form>

      <div class="mt-6">
        <p class="text-center text-xs text-slate-500">
          Internal access only. Contact IT for account requests.
        </p>
      </div>
    </div>
  </div>
</div>
